name: Stepcast Play Release

# Manually-triggered lane that signs with the PRIVATE upload key held in
# GitHub secrets and produces the AAB for Play Console upload. Never runs
# automatically; artifacts stay private (workflow artifacts, not the public
# rolling release). Setup steps: PLAY_READINESS.md.

on:
  workflow_dispatch:
    inputs:
      versionCode:
        description: 'versionCode for this upload (integer, must exceed the last Play upload)'
        required: true
        type: string
      versionName:
        description: 'versionName shown to users, e.g. 0.3.0'
        required: true
        type: string

permissions:
  contents: read

jobs:
  play-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check signing secrets are configured
        env:
          KS_B64: ${{ secrets.PLAY_UPLOAD_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.PLAY_UPLOAD_STORE_PASSWORD }}
        run: |
          missing=""
          [ -z "$KS_B64" ] && missing="$missing PLAY_UPLOAD_KEYSTORE_BASE64"
          [ -z "$KS_PASS" ] && missing="$missing PLAY_UPLOAD_STORE_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secrets:$missing — see PLAY_READINESS.md for setup"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'
          cache-read-only: true

      - name: Decode upload keystore
        env:
          KS_B64: ${{ secrets.PLAY_UPLOAD_KEYSTORE_BASE64 }}
        run: printf '%s' "$KS_B64" | base64 -d > "$RUNNER_TEMP/upload.keystore"

      - name: Unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Build signed AAB + APK
        env:
          STEPCAST_UPLOAD_KEYSTORE: ${{ runner.temp }}/upload.keystore
          STEPCAST_UPLOAD_STORE_PASSWORD: ${{ secrets.PLAY_UPLOAD_STORE_PASSWORD }}
          STEPCAST_UPLOAD_KEY_ALIAS: ${{ secrets.PLAY_UPLOAD_KEY_ALIAS }}
          STEPCAST_UPLOAD_KEY_PASSWORD: ${{ secrets.PLAY_UPLOAD_KEY_PASSWORD }}
        run: |
          gradle bundleRelease assembleRelease --stacktrace \
            -PstepcastVersionCode='${{ inputs.versionCode }}' \
            -PstepcastVersionName='${{ inputs.versionName }}'

      - name: Remove keystore from runner
        if: always()
        run: rm -f "$RUNNER_TEMP/upload.keystore"

      - name: Upload AAB (for Play Console)
        uses: actions/upload-artifact@v4
        with:
          name: stepcast-play-aab-${{ inputs.versionCode }}
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      # Same key as the AAB — installable for a final on-device check that
      # the Play-signed build behaves like the daily-driver build.
      - name: Upload upload-key-signed APK (sanity install)
        uses: actions/upload-artifact@v4
        with:
          name: stepcast-play-apk-${{ inputs.versionCode }}
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14
