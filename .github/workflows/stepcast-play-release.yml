name: Stepcast Play Release

# Manually-triggered lane that signs with the PRIVATE upload key held in
# GitHub secrets and produces the AAB for Play Console upload. Never runs
# automatically; artifacts stay private (workflow artifacts, not the public
# rolling release). Setup steps: PLAY_READINESS.md.

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'versionName shown to users, e.g. 0.3.0 (versionCode is auto-derived from the commit count)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  play-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check signing secrets are configured
        env:
          KS_B64: ${{ secrets.PLAY_UPLOAD_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.PLAY_UPLOAD_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.PLAY_UPLOAD_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.PLAY_UPLOAD_KEY_PASSWORD }}
        run: |
          # All four are required: the build step passes each secret through
          # as an env var, and an unset secret becomes an empty string (not
          # null), so Gradle's `?: "stepcast-upload"` default never kicks in
          # under CI — an empty alias/password would fail deep in signing.
          missing=""
          [ -z "$KS_B64" ] && missing="$missing PLAY_UPLOAD_KEYSTORE_BASE64"
          [ -z "$KS_PASS" ] && missing="$missing PLAY_UPLOAD_STORE_PASSWORD"
          [ -z "$KEY_ALIAS" ] && missing="$missing PLAY_UPLOAD_KEY_ALIAS"
          [ -z "$KEY_PASS" ] && missing="$missing PLAY_UPLOAD_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secrets:$missing — see PLAY_READINESS.md for setup"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the commit count is accurate

      - name: Compute versionCode from commit count
        id: version
        run: |
          # Monotonic, unique, zero-bookkeeping: every commit on the branch
          # bumps this, so you never track version codes by hand. Needs
          # fetch-depth: 0 above (a shallow clone would report 1). Play only
          # requires versionCode to increase, not be contiguous.
          code="$(git rev-list --count HEAD)"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "::notice::versionCode = $code, versionName = ${{ inputs.versionName }}"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'
          cache-read-only: true

      - name: Decode upload keystore
        env:
          KS_B64: ${{ secrets.PLAY_UPLOAD_KEYSTORE_BASE64 }}
        run: printf '%s' "$KS_B64" | base64 -d > "$RUNNER_TEMP/upload.keystore"

      - name: Validate decoded keystore
        env:
          STORE_PASS: ${{ secrets.PLAY_UPLOAD_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.PLAY_UPLOAD_KEY_ALIAS }}
        run: |
          # Fail fast with a readable message instead of a deep Gradle
          # KeytoolException/EOFException if the base64 secret decoded to an
          # empty/truncated file or the store password / alias don't match.
          ks="$RUNNER_TEMP/upload.keystore"
          if [ ! -s "$ks" ]; then
            echo "::error::PLAY_UPLOAD_KEYSTORE_BASE64 decoded to an empty file — the secret is missing, truncated, or not valid base64. Re-encode the keystore and update the secret (PLAY_READINESS.md §2)."
            exit 1
          fi
          if ! "$JAVA_HOME/bin/keytool" -list -keystore "$ks" \
               -storepass "$STORE_PASS" -alias "$KEY_ALIAS" >/dev/null 2>keytool.err; then
            echo "::error::Upload keystore is unreadable. Either PLAY_UPLOAD_KEYSTORE_BASE64 didn't decode to a valid keystore, or PLAY_UPLOAD_STORE_PASSWORD / PLAY_UPLOAD_KEY_ALIAS don't match it (PLAY_READINESS.md §2)."
            sed 's/^/keytool: /' keytool.err || true
            exit 1
          fi
          echo "Upload keystore OK: alias '$KEY_ALIAS' present and readable."

      - name: Unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Build signed AAB + APK
        env:
          STEPCAST_UPLOAD_KEYSTORE: ${{ runner.temp }}/upload.keystore
          STEPCAST_UPLOAD_STORE_PASSWORD: ${{ secrets.PLAY_UPLOAD_STORE_PASSWORD }}
          STEPCAST_UPLOAD_KEY_ALIAS: ${{ secrets.PLAY_UPLOAD_KEY_ALIAS }}
          STEPCAST_UPLOAD_KEY_PASSWORD: ${{ secrets.PLAY_UPLOAD_KEY_PASSWORD }}
        run: |
          gradle bundleRelease assembleRelease --stacktrace \
            -PstepcastVersionCode='${{ steps.version.outputs.code }}' \
            -PstepcastVersionName='${{ inputs.versionName }}'

      - name: Remove keystore from runner
        if: always()
        run: rm -f "$RUNNER_TEMP/upload.keystore"

      - name: Upload AAB (for Play Console)
        uses: actions/upload-artifact@v4
        with:
          name: stepcast-play-aab-${{ steps.version.outputs.code }}
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      # Same key as the AAB — installable for a final on-device check that
      # the Play-signed build behaves like the daily-driver build.
      - name: Upload upload-key-signed APK (sanity install)
        uses: actions/upload-artifact@v4
        with:
          name: stepcast-play-apk-${{ steps.version.outputs.code }}
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14
