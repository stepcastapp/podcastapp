name: Stepcast Build

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

concurrency:
  group: stepcast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'
          cache-read-only: false

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Unit tests
        run: gradle testDebugUnitTest --stacktrace

      # R8-minified, same shared signing — the build users should sideload
      - name: Build release APK
        run: gradle assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: stepcast-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: stepcast-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # Artifacts require a browser login to download; a release asset is a
      # plain public link, so the phone can grab the APK directly.
      - name: Publish rolling stepcast-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk stepcast-debug.apk
          cp app/build/outputs/apk/release/app-release.apk stepcast-release.apk
          gh release view stepcast-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create stepcast-latest \
              --repo "$GITHUB_REPOSITORY" \
              --title "Stepcast (latest)" \
              --notes "Rolling build, auto-updated by CI on every green run." \
              --prerelease
          gh release upload stepcast-latest stepcast-debug.apk stepcast-release.apk \
            --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit stepcast-latest \
            --repo "$GITHUB_REPOSITORY" \
            --title "Stepcast (latest)" \
            --notes "Rolling build, auto-updated by CI. stepcast-release.apk is the R8-minified build to install; stepcast-debug.apk is for debugging. Current: ${GITHUB_SHA::7} ($(date -u +%Y-%m-%dT%H:%MZ))."
